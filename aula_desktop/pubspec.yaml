name: aula_desktop
description: Desktop GUI for the AULA S98 Pro keyboard — native Dart HID implementation.
publish_to: 'none'
version: 1.0.0+2

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  ffi: ^2.1.4
  file_picker: ^10.2.0
  flex_color_picker: ^3.7.1
  image: ^4.5.4
  intl: ^0.20.2
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true
